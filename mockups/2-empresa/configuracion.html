<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FumiControl - Configuración Empresa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="layout-with-sidebar">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="sidebar-brand"><span>🏢</span> López S.A.</div></div>
            <nav class="sidebar-nav">
                <a href="configuracion.html" class="nav-item active"><span class="nav-item-icon">⚙️</span> Configuración</a>
            </nav>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <div><h1 class="page-title">⚙️ Configuración de Empresa</h1><p class="page-subtitle">Datos fiscales, branding y preferencias</p></div>
            </div>
            <div class="grid" style="grid-template-columns: 250px 1fr; gap: 24px;">
                <div class="card" style="height:fit-content;">
                    <div class="card-body">
                        <nav style="display:flex;flex-direction:column;gap:4px;">
                            <a href="#" style="padding:10px 12px;border-radius:8px;background:rgba(59,130,246,0.1);color:var(--color-accent-primary);font-weight:500;">📋 Datos Generales</a>
                            <a href="#" style="padding:10px 12px;border-radius:8px;">🎨 Branding</a>
                            <a href="#" style="padding:10px 12px;border-radius:8px;">💳 Datos Fiscales</a>
                            <a href="#" style="padding:10px 12px;border-radius:8px;">👥 Usuarios</a>
                            <a href="#" style="padding:10px 12px;border-radius:8px;">🔔 Notificaciones</a>
                            <a href="#" style="padding:10px 12px;border-radius:8px;">🔗 Integraciones</a>
                        </nav>
                    </div>
                </div>
                <div>
                    <div class="card mb-lg">
                        <div class="card-header"><h3 class="card-title">📋 Datos Generales</h3></div>
                        <div class="card-body">
                            <div class="grid grid-2" style="gap:16px;">
                                <div class="form-group"><label class="form-label">Nombre de la Empresa</label><input type="text" class="form-input" value="Fumigaciones López S.A. de C.V."></div>
                                <div class="form-group"><label class="form-label">Nombre Comercial</label><input type="text" class="form-input" value="López S.A."></div>
                                <div class="form-group"><label class="form-label">Teléfono</label><input type="text" class="form-input" value="55 5555 1234"></div>
                                <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" value="contacto@lopezsa.com.mx"></div>
                                <div class="form-group" style="grid-column:span 2;"><label class="form-label">Dirección</label><input type="text" class="form-input" value="Av. Insurgentes Sur 1234, Col. Del Valle, CDMX"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card mb-lg">
                        <div class="card-header"><h3 class="card-title">🎨 Branding</h3></div>
                        <div class="card-body">
                            <div class="grid grid-2" style="gap:24px;">
                                <div>
                                    <label class="form-label">Logo de la Empresa</label>
                                    <div style="width:150px;height:150px;background:var(--color-bg-tertiary);border:2px dashed var(--color-border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;">
                                        <span style="font-size:3rem;">🏢</span>
                                    </div>
                                    <button class="btn btn-secondary btn-sm mt-sm">📤 Subir Logo</button>
                                </div>
                                <div>
                                    <label class="form-label">Color Primario</label>
                                    <div style="display:flex;gap:8px;margin-bottom:16px;">
                                        <div style="width:40px;height:40px;background:#3b82f6;border-radius:8px;border:3px solid white;box-shadow:0 0 0 2px #3b82f6;"></div>
                                        <div style="width:40px;height:40px;background:#10b981;border-radius:8px;cursor:pointer;"></div>
                                        <div style="width:40px;height:40px;background:#8b5cf6;border-radius:8px;cursor:pointer;"></div>
                                        <div style="width:40px;height:40px;background:#ef4444;border-radius:8px;cursor:pointer;"></div>
                                        <div style="width:40px;height:40px;background:#f59e0b;border-radius:8px;cursor:pointer;"></div>
                                    </div>
                                    <label class="form-label">Eslogan (para documentos)</label>
                                    <input type="text" class="form-input" value="Control de plagas profesional">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3 class="card-title">💳 Datos Fiscales</h3></div>
                        <div class="card-body">
                            <div class="grid grid-2" style="gap:16px;">
                                <div class="form-group"><label class="form-label">RFC</label><input type="text" class="form-input" value="FLO850101ABC"></div>
                                <div class="form-group"><label class="form-label">Régimen Fiscal</label>
                                    <select class="form-input form-select"><option>601 - General de Ley Personas Morales</option><option>603 - Personas Morales con Fines no Lucrativos</option></select>
                                </div>
                                <div class="form-group" style="grid-column:span 2;"><label class="form-label">Dirección Fiscal</label><input type="text" class="form-input" value="Av. Insurgentes Sur 1234, Col. Del Valle, 03100, CDMX"></div>
                            </div>
                            <button class="btn btn-primary mt-md">💾 Guardar Cambios</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
