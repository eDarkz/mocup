<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FumiControl - App Móvil: Navegación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body { background: var(--color-bg-primary); }
        .mobile-frame { max-width: 390px; margin: 20px auto; background: var(--color-bg-secondary); border-radius: 40px; padding: 0; min-height: 800px; box-shadow: 0 0 0 12px #1a1a2e, 0 20px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .nav-map { height: 400px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position: relative; }
        .route-eta { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 20px; text-align: center; }
        .eta-time { font-size: 1.5rem; font-weight: 700; }
        .current-location { position: absolute; top: 55%; left: 45%; width: 24px; height: 24px; background: #3b82f6; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 20px rgba(59,130,246,0.5); }
        .destination-pin { position: absolute; top: 30%; left: 65%; transform: translate(-50%, -100%); }
        .pin-icon { width: 36px; height: 36px; background: #ef4444; border-radius: 50% 50% 0 50%; transform: rotate(-45deg); display: flex; align-items: center; justify-content: center; }
        .pin-icon span { transform: rotate(45deg); }
        .route-line { position: absolute; top: 32%; left: 48%; width: 120px; height: 120px; border: 4px dashed #3b82f6; border-radius: 0 50% 0 0; transform: rotate(45deg); border-left: none; border-bottom: none; }
        .nav-panel { background: var(--color-bg-card); border-radius: 24px 24px 0 0; margin-top: -24px; position: relative; z-index: 10; padding: 20px; }
        .next-step { background: var(--color-bg-tertiary); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 16px; }
        .step-arrow { font-size: 2rem; }
        .nav-apps { display: flex; gap: 12px; margin-top: 16px; }
        .nav-app-btn { flex: 1; padding: 14px; background: var(--color-bg-tertiary); border: 1px solid var(--color-border); border-radius: 12px; text-align: center; cursor: pointer; }
        .nav-app-btn:hover { background: var(--color-bg-card); border-color: var(--color-accent-primary); }
    </style>
</head>
<body>
    <div class="mobile-frame">
        <div class="nav-map">
            <div style="position:absolute;top:20px;left:20px;right:20px;display:flex;justify-content:space-between;z-index:5;">
                <button style="background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:40px;height:40px;color:white;cursor:pointer;">←</button>
                <button style="background:rgba(0,0,0,0.7);border:none;border-radius:50%;width:40px;height:40px;color:white;cursor:pointer;">⚙️</button>
            </div>
            <div class="route-eta">
                <div class="eta-time">12 min</div>
                <div style="font-size:0.85rem;color:var(--color-text-muted);">4.2 km • 11:10 AM llegada</div>
            </div>
            <div class="route-line"></div>
            <div class="current-location"></div>
            <div class="destination-pin">
                <div class="pin-icon"><span>🏨</span></div>
            </div>
        </div>
        <div class="nav-panel">
            <div class="next-step">
                <span class="step-arrow">↗️</span>
                <div style="flex:1;">
                    <strong style="font-size:1.1rem;">Gira a la derecha</strong>
                    <div style="color:var(--color-text-muted);">en Av. Paseo de la Reforma</div>
                </div>
                <strong>350m</strong>
            </div>
            <div style="background:var(--color-bg-tertiary);border-radius:12px;padding:16px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                    <strong>🏨 Hotel Marriott Reforma</strong>
                    <span class="badge badge-primary">Próximo</span>
                </div>
                <div style="font-size:0.85rem;color:var(--color-text-muted);margin-bottom:4px;">Paseo de la Reforma 325</div>
                <div style="font-size:0.85rem;color:var(--color-text-muted);">📞 55 5263 8888 • Contacto: Juan García</div>
            </div>
            <h4 style="margin:16px 0 8px;">🗺️ Abrir en tu app favorita</h4>
            <div class="nav-apps">
                <div class="nav-app-btn">
                    <div style="font-size:1.5rem;margin-bottom:4px;">🗺️</div>
                    <div style="font-size:0.85rem;">Google Maps</div>
                </div>
                <div class="nav-app-btn">
                    <div style="font-size:1.5rem;margin-bottom:4px;">🔵</div>
                    <div style="font-size:0.85rem;">Waze</div>
                </div>
                <div class="nav-app-btn">
                    <div style="font-size:1.5rem;margin-bottom:4px;">🍎</div>
                    <div style="font-size:0.85rem;">Apple Maps</div>
                </div>
            </div>
            <button class="btn btn-success" style="width:100%;margin-top:16px;">📍 He llegado - Check-in</button>
        </div>
    </div>
</body>
</html>
